<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="55%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#3b82f6" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Glow -->
  <circle cx="950" cy="180" r="320" fill="#3b82f6" opacity="0.12"/>

  <!-- Brand -->
  <text x="80" y="130" font-family="Arial, sans-serif" font-size="34" font-weight="900" fill="#ffffff">
    Pixel<tspan fill="#3b82f6">Craft</tspan> Studio
  </text>

  <!-- Eyebrow -->
  <text x="80" y="230" font-family="Arial, sans-serif" font-size="26" font-weight="600" fill="#94a3b8" letter-spacing="2">PROBLEM IDENTIFIED.</text>

  <!-- Main headline -->
  <text x="80" y="320" font-family="Arial, sans-serif" font-size="76" font-weight="900" fill="url(#blue)">Custom Digital Solutions.</text>

  <!-- Growth line -->
  <text x="80" y="400" font-family="Arial, sans-serif" font-size="44" font-weight="800" fill="#4ade80">Real Business Growth.</text>

  <!-- Sub -->
  <text x="80" y="475" font-family="Arial, sans-serif" font-size="26" fill="#cbd5e1">Custom websites &amp; apps built for your exact business needs.</text>

  <!-- Tags row -->
  <g font-family="Arial, sans-serif" font-size="20" font-weight="600" fill="#bfdbfe">
    <rect x="80"  y="520" width="180" height="48" rx="24" fill="#1e3a8a" stroke="#3b82f6" stroke-opacity="0.4"/>
    <text x="170" y="551" text-anchor="middle">Websites</text>
    <rect x="276" y="520" width="160" height="48" rx="24" fill="#1e3a8a" stroke="#3b82f6" stroke-opacity="0.4"/>
    <text x="356" y="551" text-anchor="middle">Apps</text>
    <rect x="452" y="520" width="230" height="48" rx="24" fill="#1e3a8a" stroke="#3b82f6" stroke-opacity="0.4"/>
    <text x="567" y="551" text-anchor="middle">Enterprise Tools</text>
  </g>

  <!-- Founder bottom-right -->
  <text x="1120" y="575" text-anchor="end" font-family="Arial, sans-serif" font-size="22" fill="#93c5fd">Sandeep Singsarva · Founder &amp; Lead Developer</text>
</svg>
